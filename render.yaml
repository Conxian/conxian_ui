services:
  - type: web
    name: conxian-ui
    env: node
    plan: free
    buildCommand: "corepack enable && corepack prepare pnpm@10.17.1 --activate && NPM_CONFIG_PRODUCTION=false pnpm install --frozen-lockfile && pnpm build"
    startCommand: "corepack enable && corepack prepare pnpm@10.17.1 --activate && pnpm start"
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
        value: "1"
      - key: NEXT_PUBLIC_CORE_API_URL
        value: https://api.testnet.hiro.so
      - key: NEXT_PUBLIC_GATEWAY_URL
        value: https://gateway.conxian-labs.com
      - key: NEXT_PUBLIC_VAULT_URL
        value: https://vault.conxian-labs.com
      - key: NEXT_PUBLIC_NEXUS_URL
        value: https://nexus.conxian-labs.com
      - key: NEXT_PUBLIC_CONXIAN_API_KEY
        value: "your-api-key"
